---
- name: Deploy Project 1 (Version 3 - Containerization with Docker Compose)
  hosts: webservers
  become: true
  vars:
    group_code: "05"
    repo_url: "https://github.com/strbynight/web_app_notes.git"
    repo_branch: "main"
    repo_root: "/opt/project_05"
    old_service_name: "project_05-backend.service"
    old_nginx_conf: "project_05.conf"

  tasks:
    - name: 1. Остановить и полностью отключить старую службу бэкенда на хосте
      ansible.builtin.systemd:
        name: "{{ old_service_name }}"
        state: stopped
        enabled: false
      failed_when: false

    - name: 2. Удалить старый конфигурационный файл Nginx на хосте
      ansible.builtin.file:
        path: "/etc/nginx/sites-enabled/{{ old_nginx_conf }}"
        state: absent
      notify: Restart Host Nginx

    - name: 3. Синхронизировать свежий код и Docker-файлы из репозитория GitHub
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_root }}"
        version: "{{ repo_branch }}"
        force: yes

    - name: 4. Запустить сборку образов и поднять контейнеры через Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ repo_root }}"
        state: present
        build: always

  handlers:
    - name: Restart Host Nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted