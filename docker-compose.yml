services:
  db:
    image: postgres:15-alpine
    container_name: project_05-db
    environment:
      POSTGRES_DB: "notes_db_05"
      POSTGRES_USER: "notes_user_05"
      POSTGRES_PASSWORD: "password123"
    volumes:
      - pgdata_05:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5405:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_user_05 -d notes_db_05"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - project_05-network

  backend:
    build:
      context: ./backend
    container_name: project_05-backend
    environment:
      DB_HOST: db
      DB_NAME: "notes_db_05"
      DB_USER: "notes_user_05"
      DB_PASS: "password123"
    ports:
      - "5005:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/notes').read()"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - project_05-network

  nginx:
    image: nginx:alpine
    container_name: project_05-nginx
    ports:
      - "8005:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - project_05-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: project_05-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata_05:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9005:9090"
    depends_on:
      - backend
    networks:
      - project_05-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: project_05-grafana
    ports:
      - "3005:3000"
    volumes:
      - grafanadata_05:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - project_05-network

volumes:
  pgdata_05:
    name: pgdata_05
  promdata_05:
    name: promdata_05
  grafanadata_05:
    name: grafanadata_05

networks:
  project_05-network:
    name: project_05-network